name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege: the workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      # ESLint 10 requires Node >=20.19, so lint runs once on the current LTS
      # rather than across the build matrix (static analysis is runtime-agnostic).
      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Pin pnpm 9 explicitly: it supports Node 18/20/22, while pnpm 11 requires Node >=22.13.
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test with coverage (enforces coverageThreshold)
        run: pnpm exec jest --coverage

      - name: Build (ESM + CJS + d.ts)
        run: pnpm run build

  compat:
    name: compat (next ${{ matrix.next }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        next: [13, 14, 15]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build + pack the real tarball, then type-check a throwaway App Router
      # consumer against next@${{ matrix.next }}. Proves the published surface
      # honors `peerDependencies: next >=13` instead of only asserting it.
      - name: Compatibility smoke (next ${{ matrix.next }})
        run: bash scripts/compat-smoke.sh ${{ matrix.next }}
